spring:
  application:
    name: api-gateway
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: ${app.cors.allowed-origins:http://localhost:3000,http://localhost:5173,http://localhost:4200,http://127.0.0.1:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - Content-Type
            allowCredentials: true
            maxAge: 3600
      # Global filters and settings
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Gateway-Request-Id
            value: "${GATEWAY_REQUEST_ID_HEADER:api-gateway}"
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers Vary
            strategy: RETAIN_FIRST

      # Route definitions
      routes:
        # ===== AUTHENTICATION SERVICE ROUTES =====
        - id: auth-register
          uri: ${AUTH_SERVICE_URI:lb://auth-service}
          predicates:
            - Path=/api/v1/auth/register
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - AddRequestHeader=X-Auth-Type,registration

        - id: auth-login
          uri: ${AUTH_SERVICE_URI:lb://auth-service}
          predicates:
            - Path=/api/v1/auth/login
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - AddRequestHeader=X-Auth-Type,login

        - id: auth-logout
          uri: ${AUTH_SERVICE_URI:lb://auth-service}
          predicates:
            - Path=/api/v1/auth/logout
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - AddRequestHeader=X-Auth-Type,logout

        - id: auth-oauth2
          uri: ${AUTH_SERVICE_URI:lb://auth-service}
          predicates:
            - Path=/api/v1/auth/oauth2/**
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - AddRequestHeader=X-Auth-Type,oauth2

        # ===== QUANTITY SERVICE ROUTES (Authenticated) =====
        - id: quantity-route
          uri: ${QUANTITY_SERVICE_URI:lb://quantity-service}
          predicates:
            - Path=/api/v1/quantities/**
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: GET,POST,PUT,DELETE
            - name: CircuitBreaker
              args:
                name: quantityCircuitBreaker
                fallbackUri: forward:/fallback/quantity

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,gateway
      cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200,http://127.0.0.1:5173}
        allowed-methods: GET,OPTIONS
        allowed-headers: "*"
        allow-credentials: true
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200,http://127.0.0.1:5173}
  services:
    quantity:
      name: ${QUANTITY_SERVICE_NAME:quantity-service}
  gateway:
    retry:
      retries: ${GATEWAY_RETRY_RETRIES:2}

resilience4j:
  circuitbreaker:
    instances:
      authCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
      quantityCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5

logging:
  level:
    root: INFO

