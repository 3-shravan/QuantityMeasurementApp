server:
  port: ${LOCAL_SERVER_PORT:8080}

AUTH_SERVICE_URI: ${LOCAL_AUTH_SERVICE_URI:http://localhost:8081}

eureka:
  client:
    service-url:
      defaultZone: ${LOCAL_EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

app:
  gateway:
    retry:
      retries: ${LOCAL_GATEWAY_RETRY_RETRIES:2}

logging:
  level:
    root: ${LOCAL_LOG_LEVEL_ROOT:${LOG_LEVEL_ROOT:INFO}}
    org.springframework.cloud.gateway: DEBUG
    com.app.apigateway: DEBUG

