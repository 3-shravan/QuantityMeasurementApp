spring.application.name=api-gateway
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8081}

# ACTUATOR (BASE DEFAULTS)
management.endpoints.web.exposure.include=health,metrics,info,gateway
management.endpoint.health.show-details=always

# EUREKA CLIENT
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Downstream service id for routes currently served by monolith/extracted services
app.services.quantity.name=${QUANTITY_SERVICE_NAME:quantity-measurement-app}

# Gateway resilience/rate-limit defaults
app.gateway.retry.retries=${GATEWAY_RETRY_RETRIES:2}
app.gateway.ratelimit.auth.replenish-rate=${GATEWAY_AUTH_RATE_PER_SEC:20}
app.gateway.ratelimit.auth.burst-capacity=${GATEWAY_AUTH_BURST_CAPACITY:40}
app.gateway.ratelimit.quantity.replenish-rate=${GATEWAY_QUANTITY_RATE_PER_SEC:30}
app.gateway.ratelimit.quantity.burst-capacity=${GATEWAY_QUANTITY_BURST_CAPACITY:60}

resilience4j.circuitbreaker.instances.authCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.authCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authCircuitBreaker.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.authCircuitBreaker.permitted-number-of-calls-in-half-open-state=5

resilience4j.circuitbreaker.instances.quantityCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.quantityCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.quantityCircuitBreaker.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.quantityCircuitBreaker.permitted-number-of-calls-in-half-open-state=5

# Explicit routes for existing API paths from the monolith
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=lb://${app.services.quantity.name}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0].name=Retry
spring.cloud.gateway.routes[0].filters[0].args.retries=${app.gateway.retry.retries}
spring.cloud.gateway.routes[0].filters[0].args.statuses=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
spring.cloud.gateway.routes[0].filters[0].args.methods=GET,POST,PUT,DELETE
spring.cloud.gateway.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.name=authCircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.fallbackUri=forward:/fallback/auth
spring.cloud.gateway.routes[0].filters[2].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[2].args.redis-rate-limiter.replenishRate=${app.gateway.ratelimit.auth.replenish-rate}
spring.cloud.gateway.routes[0].filters[2].args.redis-rate-limiter.burstCapacity=${app.gateway.ratelimit.auth.burst-capacity}
spring.cloud.gateway.routes[0].filters[2].args.key-resolver=#{@userKeyResolver}

spring.cloud.gateway.routes[1].id=quantity-route
spring.cloud.gateway.routes[1].uri=lb://${app.services.quantity.name}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/quantities/**
spring.cloud.gateway.routes[1].filters[0].name=Retry
spring.cloud.gateway.routes[1].filters[0].args.retries=${app.gateway.retry.retries}
spring.cloud.gateway.routes[1].filters[0].args.statuses=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
spring.cloud.gateway.routes[1].filters[0].args.methods=GET,POST,PUT,DELETE
spring.cloud.gateway.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[1].args.name=quantityCircuitBreaker
spring.cloud.gateway.routes[1].filters[1].args.fallbackUri=forward:/fallback/quantity
spring.cloud.gateway.routes[1].filters[2].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[2].args.redis-rate-limiter.replenishRate=${app.gateway.ratelimit.quantity.replenish-rate}
spring.cloud.gateway.routes[1].filters[2].args.redis-rate-limiter.burstCapacity=${app.gateway.ratelimit.quantity.burst-capacity}
spring.cloud.gateway.routes[1].filters[2].args.key-resolver=#{@userKeyResolver}

# Route services by discovery service id (e.g. lb://quantity-service)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# LOGGING
logging.level.root=INFO

