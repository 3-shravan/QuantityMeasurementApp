spring:
  application:
    name: auth-service
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: false

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidationPurposeOnly12345}
    expiration: ${JWT_EXPIRATION:${JWT_EXPIRATION_MS:86400000}}

logging:
  level:
    root: INFO
    com.app.authservice: DEBUG

