server:
  port: ${LOCAL_SERVER_PORT:8081}

spring:
  datasource:
    url: ${LOCAL_DB_URL:jdbc:mysql://127.0.0.1:3306/quantitymeasurement?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${LOCAL_DB_USERNAME:root}
    password: ${LOCAL_DB_PASSWORD:shravan}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${LOCAL_DB_DDL_AUTO:${DB_DDL_AUTO:update}}
    show-sql: false
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${LOCAL_GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID:dev-google-client-id}}
            client-secret: ${LOCAL_GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:dev-google-client-secret}}
            redirect-uri: ${LOCAL_GOOGLE_REDIRECT_URI:${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}}
            scope: profile,email

eureka:
  client:
    service-url:
      defaultZone: ${LOCAL_EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

