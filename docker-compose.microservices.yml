services:
  redis:
    image: redis:7-alpine
    container_name: qmp-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: qmp-eureka-server
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${EUREKA_SERVER_PORT:-8761}
      EUREKA_HOST: eureka-server
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server:8761/eureka/}
    ports:
      - "${EUREKA_SERVER_PORT:-8761}:8761"
    depends_on:
      - redis

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: qmp-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${API_GATEWAY_PORT:-8081}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server:8761/eureka/}
      QUANTITY_SERVICE_NAME: ${QUANTITY_SERVICE_NAME:-quantity-measurement-app}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      GATEWAY_RETRY_RETRIES: ${GATEWAY_RETRY_RETRIES:-2}
      GATEWAY_AUTH_RATE_PER_SEC: ${GATEWAY_AUTH_RATE_PER_SEC:-20}
      GATEWAY_AUTH_BURST_CAPACITY: ${GATEWAY_AUTH_BURST_CAPACITY:-40}
      GATEWAY_QUANTITY_RATE_PER_SEC: ${GATEWAY_QUANTITY_RATE_PER_SEC:-30}
      GATEWAY_QUANTITY_BURST_CAPACITY: ${GATEWAY_QUANTITY_BURST_CAPACITY:-60}
    ports:
      - "${API_GATEWAY_PORT:-8081}:8081"
    depends_on:
      - eureka-server
      - redis


