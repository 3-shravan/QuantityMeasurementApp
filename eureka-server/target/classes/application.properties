spring.application.name=eureka-server
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8761}

# ACTUATOR (BASE DEFAULTS)
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# EUREKA SERVER
eureka.instance.hostname=${EUREKA_HOST:localhost}
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://${eureka.instance.hostname}:${server.port}/eureka/}

# LOGGING
logging.level.root=INFO

