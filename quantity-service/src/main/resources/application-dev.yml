server:
  port: ${LOCAL_SERVER_PORT:8082}

spring:
  datasource:
    url: ${LOCAL_DB_URL:jdbc:mysql://127.0.0.1:3306/quantitymeasurement?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${LOCAL_DB_USERNAME:root}
    password: ${LOCAL_DB_PASSWORD:shravan}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${LOCAL_DB_DDL_AUTO:${DB_DDL_AUTO:update}}
    show-sql: false
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${LOCAL_EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

